name: CI

on:
  # Push only on master so Swatinem/rust-cache saves a cache in the
  # default-branch scope — tag-triggered release builds can only restore
  # caches from the default branch. Feature-branch validation goes
  # through pull_request to avoid the push+PR double-run.
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Compile launcher stub
        # The launcher stub is a tiny standalone .NET console exe embedded
        # into the Rust binary via `include_bytes!`. Compiled with the
        # framework csc.exe that ships with Windows — no .NET SDK install
        # needed on the runner.
        run: |
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:winexe /win32icon:launcher_stub.ico /out:launcher_stub.exe launcher_stub.cs

      - name: Cargo check
        working-directory: tauri/src-tauri
        run: cargo check --all-targets

      - name: Cargo clippy
        working-directory: tauri/src-tauri
        run: cargo clippy --all-targets

      - name: Cargo test
        working-directory: tauri/src-tauri
        run: cargo test --all

      - name: Svelte check
        working-directory: tauri
        run: bun run check

      - name: ESLint
        working-directory: tauri
        run: bun run lint

      - name: Tauri build (no bundle)
        working-directory: tauri
        # Smoke-test that the full app builds end-to-end (frontend +
        # backend). Skip bundle generation to keep CI fast — `release.yml`
        # is responsible for producing artifacts.
        run: bun run tauri build -- --no-bundle

  # Mirrors the `build-linux` job in release.yml so the rust-cache key
  # matches. On master pushes this populates the Linux cache; on tag
  # pushes the release job restores from it.
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Tauri build (no bundle)
        working-directory: tauri
        # Same as the Windows job — release-profile compile populates the
        # cache with the artifacts release.yml will actually reuse.
        run: bun run tauri build -- --no-bundle
