name: CI

on:
  # Push only on master so Swatinem/rust-cache saves a cache in the
  # default-branch scope — tag-triggered release builds can only restore
  # caches from the default branch. Feature-branch validation goes
  # through pull_request to avoid the push+PR double-run.
  push:
    branches:
      - master
    paths:
      - 'tauri/**'
      - 'server/**'
      - 'decky/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'tauri/**'
      - 'server/**'
      - 'decky/**'
      - '.github/workflows/ci.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Mirror release.yml so this workflow populates the same sccache
      # entries that release.yml will restore on tag pushes.
      SCCACHE_DIR: "${{ github.workspace }}/.sccache"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      # Workspace-local bun cache dir so actions/cache can persist it with
      # one OS-agnostic path.
      BUN_INSTALL_CACHE_DIR: "${{ github.workspace }}/.bun-cache"
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Enable LLD linker
        # link.exe is the slow, uncached part of the Windows build (sccache
        # only caches rustc codegen, never linking). Point rustc at LLVM's
        # lld-link (the MSVC-flavour LLD, preinstalled on the runner) to cut
        # link time across the test binaries and the release build. Probe
        # first so a runner-image change that drops LLVM falls back to
        # link.exe instead of breaking the build. Keep this identical to
        # release.yml so both share the same sccache keys (RUSTFLAGS is part
        # of the compile-cache hash).
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (Test-Path "$llvm\lld-link.exe") {
            "$llvm" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            "RUSTFLAGS=-C linker=lld-link" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "Using lld-link from $llvm"
          } else {
            Write-Warning "lld-link not found; falling back to link.exe"
          }

      - name: Bun cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.bun-cache
          key: bun-${{ runner.os }}-${{ hashFiles('tauri/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ github.ref_name }}-
            sccache-${{ runner.os }}-

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          # sccache owns object caching; rust-cache only does registry.
          cache-targets: "false"
          # Fixed key (not the job name) so the tag-triggered release
          # build restores the same registry cache this populates.
          shared-key: spool-windows

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Cache sidecars
        id: cache-sidecars
        uses: actions/cache@v4
        with:
          path: tauri/src-tauri/binaries
          key: sidecars-${{ runner.os }}-${{ hashFiles('tauri/scripts/download-sidecars.js') }}

      - name: Download sidecars
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        working-directory: tauri
        run: bun run download-sidecars

      # `cargo clippy --all-targets` compiles the same crates as
      # `cargo check` and emits the same errors plus lints, so a separate
      # check step is pure redundant compilation — dropped. Frontend
      # checks (svelte-check / eslint / vitest) moved to the `frontend`
      # job on Ubuntu, off the slow Windows critical path.
      #
      # This job stays the authoritative lint for the cfg(windows) code
      # (registry.rs, launcher.rs, the Windows arms of process.rs/ludusavi.rs)
      # — clippy only ever sees the code compiled for its own target, so the
      # fast clippy-linux job can't cover it. --all-targets still compiles the
      # cfg(windows) test targets here too, so test *execution* moving to
      # clippy-linux loses no compile coverage (the suite has no cfg(windows)
      # tests).
      - name: Cargo clippy
        working-directory: tauri/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Tauri build (no bundle)
        # master pushes only. This is the slow release-profile compile —
        # PRs get fast feedback from check/clippy/test above, while master
        # smoke-tests the full app build and warms the release-profile
        # sccache cache that release.yml restores on tag pushes. Skip
        # bundle generation; release.yml produces the artifacts.
        if: github.event_name == 'push'
        working-directory: tauri
        run: bun run tauri build --no-bundle

  # Frontend checks (svelte-check / eslint / vitest). Platform-independent,
  # so they run on a fast Ubuntu runner in parallel instead of sitting in
  # the critical path of the slow Windows build.
  frontend:
    runs-on: ubuntu-latest
    env:
      BUN_INSTALL_CACHE_DIR: "${{ github.workspace }}/.bun-cache"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Bun cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.bun-cache
          key: bun-${{ runner.os }}-${{ hashFiles('tauri/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Svelte check
        working-directory: tauri
        run: bun run check

      - name: ESLint
        working-directory: tauri
        run: bun run lint

      - name: Frontend tests
        working-directory: tauri
        run: bun run test

  # Sync-server unit tests. Lightweight and platform-independent, so it
  # runs on Ubuntu in its own job rather than bloating the Windows build.
