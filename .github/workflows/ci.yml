name: CI

on:
  # Push only on master so Swatinem/rust-cache saves a cache in the
  # default-branch scope — tag-triggered release builds can only restore
  # caches from the default branch. Feature-branch validation goes
  # through pull_request to avoid the push+PR double-run.
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Mirror release.yml so this workflow populates the same sccache
      # entries that release.yml will restore on tag pushes.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      # Fall back to the real compiler when sccache can't reach its
      # backend. The GitHub Actions cache service has outages; without
      # this, a failed cache read at server startup aborts every rustc
      # call and breaks the build. With it, the run is just slower.
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      CARGO_INCREMENTAL: "0"
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Probe sccache backend (fall back to direct compile if down)
        # SCCACHE_IGNORE_SERVER_IO_ERROR only covers failures talking to an
        # already-running server — NOT the backend self-check sccache runs
        # when the server first starts. A GitHub Actions cache outage fails
        # that check, so every wrapped rustc call exits non-zero and breaks
        # the build. Start the server up front; if it can't reach the cache
        # backend, drop the wrapper for the rest of the job (GITHUB_ENV
        # overrides the job-level env for later steps) so cargo compiles
        # directly — uncached but green. bash runs on the Windows runners
        # too, so one step covers every platform.
        shell: bash
        run: |
          if sccache --start-server; then
            echo "sccache backend reachable."
          else
            echo "::warning::sccache backend unreachable (likely a GitHub Actions cache outage); building without the compiler cache."
            # Empty RUSTC_WRAPPER disables the wrapper so cargo compiles
            # directly. SCCACHE_GHA_ENABLED must be a valid off-value (not
            # empty) — the action's post-job `--show-stats` cleanup rejects
            # an empty string and would fail the job.
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          # sccache owns object caching; rust-cache only does registry.
          cache-targets: "false"
          # Fixed key (not the job name) so the tag-triggered release
          # build restores the same registry cache this populates.
          shared-key: spool-windows

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Compile launcher stub
        # The launcher stub is a tiny standalone .NET console exe embedded
        # into the Rust binary via `include_bytes!`. Compiled with the
        # framework csc.exe that ships with Windows — no .NET SDK install
        # needed on the runner.
        run: |
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:winexe /win32icon:launcher_stub.ico /out:launcher_stub.exe launcher_stub.cs

      - name: Cargo check
        working-directory: tauri/src-tauri
        run: cargo check --all-targets

      - name: Cargo clippy
        working-directory: tauri/src-tauri
        run: cargo clippy --all-targets

      - name: Cargo test
        working-directory: tauri/src-tauri
        run: cargo test --all

      - name: Svelte check
        working-directory: tauri
        run: bun run check

      - name: ESLint
        working-directory: tauri
        run: bun run lint

      - name: Frontend tests
        working-directory: tauri
        run: bun run test

      - name: Tauri build (no bundle)
        # master pushes only. This is the slow release-profile compile —
        # PRs get fast feedback from check/clippy/test above, while master
        # smoke-tests the full app build and warms the release-profile
        # sccache cache that release.yml restores on tag pushes. Skip
        # bundle generation; release.yml produces the artifacts.
        if: github.event_name == 'push'
        working-directory: tauri
        run: bun run tauri build --no-bundle

  # Sync-server unit tests. Lightweight and platform-independent, so it
  # runs on Ubuntu in its own job rather than bloating the Windows build.
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Server tests
        working-directory: server
        run: bun run test

  # Mirrors the `build-linux` job in release.yml so the rust-cache key
  # matches. master pushes only — this job is a pure release-profile
  # build (no separate lint/test steps), so it both smoke-tests the
  # Linux build and populates the Linux cache that the release job
  # restores on tag pushes. PRs skip it for fast feedback.
  build-linux:
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      # Fall back to the real compiler when sccache can't reach its
      # backend. The GitHub Actions cache service has outages; without
      # this, a failed cache read at server startup aborts every rustc
      # call and breaks the build. With it, the run is just slower.
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Probe sccache backend (fall back to direct compile if down)
        # SCCACHE_IGNORE_SERVER_IO_ERROR only covers failures talking to an
        # already-running server — NOT the backend self-check sccache runs
        # when the server first starts. A GitHub Actions cache outage fails
        # that check, so every wrapped rustc call exits non-zero and breaks
        # the build. Start the server up front; if it can't reach the cache
        # backend, drop the wrapper for the rest of the job (GITHUB_ENV
        # overrides the job-level env for later steps) so cargo compiles
        # directly — uncached but green. bash runs on the Windows runners
        # too, so one step covers every platform.
        shell: bash
        run: |
          if sccache --start-server; then
            echo "sccache backend reachable."
          else
            echo "::warning::sccache backend unreachable (likely a GitHub Actions cache outage); building without the compiler cache."
            # Empty RUSTC_WRAPPER disables the wrapper so cargo compiles
            # directly. SCCACHE_GHA_ENABLED must be a valid off-value (not
            # empty) — the action's post-job `--show-stats` cleanup rejects
            # an empty string and would fail the job.
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          cache-targets: "false"
          shared-key: spool-linux

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Tauri build (no bundle)
        working-directory: tauri
        # Same as the Windows job — release-profile compile populates the
        # cache with the artifacts release.yml will actually reuse.
        run: bun run tauri build --no-bundle

  # WebDriver end-to-end smoke tests against the real Tauri window via
  # tauri-driver (WebKitWebDriver under Xvfb). Runs on PRs and master so UI
  # regressions are gated before merge. Shares the sccache populated by
  # build-linux/build-windows, so the release build it needs stays cheap even
  # though those heavier jobs are push-only. Keeps its own rust-cache
  # registry key to avoid racing build-linux on save.
  e2e-linux:
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      # Fall back to the real compiler when sccache can't reach its
      # backend. The GitHub Actions cache service has outages; without
      # this, a failed cache read at server startup aborts every rustc
      # call and breaks the build. With it, the run is just slower.
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Probe sccache backend (fall back to direct compile if down)
        # SCCACHE_IGNORE_SERVER_IO_ERROR only covers failures talking to an
        # already-running server — NOT the backend self-check sccache runs
        # when the server first starts. A GitHub Actions cache outage fails
        # that check, so every wrapped rustc call exits non-zero and breaks
        # the build. Start the server up front; if it can't reach the cache
        # backend, drop the wrapper for the rest of the job (GITHUB_ENV
        # overrides the job-level env for later steps) so cargo compiles
        # directly — uncached but green. bash runs on the Windows runners
        # too, so one step covers every platform.
        shell: bash
        run: |
          if sccache --start-server; then
            echo "sccache backend reachable."
          else
            echo "::warning::sccache backend unreachable (likely a GitHub Actions cache outage); building without the compiler cache."
            # Empty RUSTC_WRAPPER disables the wrapper so cargo compiles
            # directly. SCCACHE_GHA_ENABLED must be a valid off-value (not
            # empty) — the action's post-job `--show-stats` cleanup rejects
            # an empty string and would fail the job.
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          cache-targets: "false"
          shared-key: spool-linux-e2e

      - name: Install Linux system dependencies
        # webkit2gtk-driver provides WebKitWebDriver, which tauri-driver drives.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Build app (no bundle)
        working-directory: tauri
        run: bun run e2e:build

      - name: Run E2E tests
        working-directory: tauri
        # Xvfb gives the webview a display in the headless runner.
        run: xvfb-run -a bun run e2e
