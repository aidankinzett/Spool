name: CI

on:
  # Push only on master so Swatinem/rust-cache saves a cache in the
  # default-branch scope — tag-triggered release builds can only restore
  # caches from the default branch. Feature-branch validation goes
  # through pull_request to avoid the push+PR double-run.
  push:
    branches:
      - master
    paths:
      - 'tauri/**'
      - 'server/**'
      - 'decky/**'
      - 'launcher_stub.*'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'tauri/**'
      - 'server/**'
      - 'decky/**'
      - 'launcher_stub.*'
      - '.github/workflows/ci.yml'

jobs:
  build-windows:
    runs-on: ubuntu-22.04
    env:
      # Mirror release.yml so this workflow populates the same sccache
      # entries that release.yml will restore on tag pushes.
      SCCACHE_DIR: "${{ github.workspace }}/.sccache"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      # Workspace-local bun cache dir so actions/cache can persist it with
      # one OS-agnostic path.
      BUN_INSTALL_CACHE_DIR: "${{ github.workspace }}/.bun-cache"
      XWIN_ARCH: "x86_64"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy, llvm-tools-preview

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis lld llvm clang

      - name: Install cargo-xwin
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cargo-xwin --no-confirm

      - name: Cache xwin sysroot
        uses: actions/cache@v4
        with:
          path: ~/.cache/xwin
          key: xwin-cache-${{ runner.os }}

      - name: Bun cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.bun-cache
          key: bun-${{ runner.os }}-${{ hashFiles('tauri/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-windows-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-windows-${{ github.ref_name }}-
            sccache-${{ runner.os }}-windows-

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          # sccache owns object caching; rust-cache only does registry.
          cache-targets: "false"
          # Fixed key (not the job name) so the tag-triggered release
          # build restores the same registry cache this populates.
          shared-key: spool-windows

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Cache sidecars
        id: cache-sidecars
        uses: actions/cache@v4
        with:
          path: tauri/src-tauri/binaries
          key: sidecars-${{ runner.os }}-${{ hashFiles('tauri/scripts/download-sidecars.js') }}

      - name: Download sidecars
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        working-directory: tauri
        run: bun run download-sidecars

      # `cargo clippy --all-targets` compiles the same crates as
      # `cargo check` and emits the same errors plus lints, so a separate
      # check step is pure redundant compilation — dropped. Frontend
      # checks (svelte-check / eslint / vitest) moved to the `frontend`
      # job on Ubuntu, off the slow Windows critical path.
      - name: Cargo clippy
        working-directory: tauri/src-tauri
        run: cargo xwin clippy --target x86_64-pc-windows-msvc --all-targets

      - name: Cargo test
        working-directory: tauri/src-tauri
        run: cargo test --all

      - name: Tauri build (no bundle)
        # master pushes only. This is the slow release-profile compile —
        # PRs get fast feedback from check/clippy/test above, while master
        # smoke-tests the full app build and warms the release-profile
        # sccache cache that release.yml restores on tag pushes. Skip
        # bundle generation; release.yml produces the artifacts.
        if: github.event_name == 'push'
        working-directory: tauri
        run: bun run tauri build --no-bundle --runner cargo-xwin --target x86_64-pc-windows-msvc

  # Frontend checks (svelte-check / eslint / vitest). Platform-independent,
  # so they run on a fast Ubuntu runner in parallel instead of sitting in
  # the critical path of the slow Windows build.
  frontend:
    runs-on: ubuntu-latest
    env:
      BUN_INSTALL_CACHE_DIR: "${{ github.workspace }}/.bun-cache"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Bun cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.bun-cache
          key: bun-${{ runner.os }}-${{ hashFiles('tauri/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Svelte check
        working-directory: tauri
        run: bun run check

      - name: ESLint
        working-directory: tauri
        run: bun run lint

      - name: Frontend tests
        working-directory: tauri
        run: bun run test

  # Sync-server unit tests. Lightweight and platform-independent, so it
  # runs on Ubuntu in its own job rather than bloating the Windows build.
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Server tests
        working-directory: server
        run: bun run test

  # Mirrors the `build-linux` job in release.yml so the rust-cache key
  # matches. master pushes only — this job is a pure release-profile
  # build (no separate lint/test steps), so it both smoke-tests the
  # Linux build and populates the Linux cache that the release job
  # restores on tag pushes. PRs skip it for fast feedback.
  build-linux:
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    env:
      SCCACHE_DIR: "${{ github.workspace }}/.sccache"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      BUN_INSTALL_CACHE_DIR: "${{ github.workspace }}/.bun-cache"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ github.ref_name }}-
            sccache-${{ runner.os }}-

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          cache-targets: "false"
          shared-key: spool-linux

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Bun cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.bun-cache
          key: bun-${{ runner.os }}-${{ hashFiles('tauri/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      # The Spool binary embeds the Decky plugin bundle (Linux only) via
      # include_str!; build it so the genuine bundle is what gets compiled in.
      # Node 22: pnpm 11 (pinned via decky/package.json packageManager) needs
      # Node >= 22.13, else corepack crashes on the node:sqlite builtin.
      - name: Setup Node for Decky plugin
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('decky/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
      - name: Build Decky plugin
        working-directory: decky
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile --store-dir ${{ github.workspace }}/.pnpm-store
          corepack pnpm build

      - name: Cache sidecars
        id: cache-sidecars
        uses: actions/cache@v4
        with:
          path: tauri/src-tauri/binaries
          key: sidecars-${{ runner.os }}-${{ hashFiles('tauri/scripts/download-sidecars.js') }}

      - name: Download sidecars
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        working-directory: tauri
        run: bun run download-sidecars

      - name: Tauri build (no bundle)
        working-directory: tauri
        # Same as the Windows job — release-profile compile populates the
        # cache with the artifacts release.yml will actually reuse.
        run: bun run tauri build --no-bundle

  # WebDriver end-to-end smoke tests against the real Tauri window via
  # tauri-driver (WebKitWebDriver under Xvfb). Runs on PRs and master so UI
  # regressions are gated before merge. Uses the same SCCACHE_DIR filesystem
  # backend as build-linux (not the GHA backend) and restores its caches via
  # the shared `sccache-Linux-` restore-keys, so the release build it needs
  # actually reuses build-linux's compiled objects instead of cold-compiling
  # a parallel GHA cache. Saves under its own `-e2e-` key to avoid colliding
  # with build-linux's save, and keeps its own rust-cache registry key for
  # the same reason.
  e2e-linux:
    runs-on: ubuntu-22.04
    env:
      SCCACHE_DIR: "${{ github.workspace }}/.sccache"
      RUSTC_WRAPPER: "sccache"
      # Fall back to the real compiler when sccache can't reach its
      # backend. The GitHub Actions cache service has outages; without
      # this, a failed cache read at server startup aborts every rustc
      # call and breaks the build. With it, the run is just slower.
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      CARGO_INCREMENTAL: "0"
      BUN_INSTALL_CACHE_DIR: "${{ github.workspace }}/.bun-cache"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Sccache cache
        # Restore via the shared `sccache-Linux-` keys so the release-profile
        # objects build-linux compiled are reused here. Save under a distinct
        # `-e2e-` key so this job doesn't collide with build-linux's save on
        # master pushes (same key = first-to-save wins, dropping the other's
        # extra objects).
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-e2e-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-e2e-${{ github.ref_name }}-
            sccache-${{ runner.os }}-${{ github.ref_name }}-
            sccache-${{ runner.os }}-

      - name: Probe sccache backend (fall back to direct compile if down)
        # SCCACHE_IGNORE_SERVER_IO_ERROR only covers failures talking to an
        # already-running server — NOT the backend self-check sccache runs
        # when the server first starts. If the start-up self-check fails,
        # every wrapped rustc call exits non-zero and breaks the build. Start
        # the server up front; if it can't initialise its backend, drop the
        # wrapper for the rest of the job (GITHUB_ENV overrides the job-level
        # env for later steps) so cargo compiles directly — uncached but
        # green.
        shell: bash
        run: |
          if sccache --start-server; then
            echo "sccache backend reachable."
          else
            echo "::warning::sccache backend unreachable; building without the compiler cache."
            # Empty RUSTC_WRAPPER disables the wrapper so cargo compiles
            # directly.
            echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          fi

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          cache-targets: "false"
          shared-key: spool-linux-e2e

      - name: Install Linux system dependencies
        # webkit2gtk-driver provides WebKitWebDriver, which tauri-driver drives.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            webkit2gtk-driver \
            xvfb

      # tauri-driver was compiled from source on every run (~minutes, fully
      # uncached). Pin the version and cache the built binary so it installs
      # once and restores instantly thereafter.
      - name: Cache tauri-driver
        id: cache-tauri-driver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}-2.0.5
      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --version 2.0.5 --locked

      - name: Bun cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.bun-cache
          key: bun-${{ runner.os }}-${{ hashFiles('tauri/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Cache sidecars
        id: cache-sidecars
        uses: actions/cache@v4
        with:
          path: tauri/src-tauri/binaries
          key: sidecars-${{ runner.os }}-${{ hashFiles('tauri/scripts/download-sidecars.js') }}

      - name: Download sidecars
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        working-directory: tauri
        run: bun run download-sidecars

      - name: Build app (no bundle)
        working-directory: tauri
        run: bun run e2e:build

      - name: Run E2E tests
        working-directory: tauri
        # Xvfb gives the webview a display in the headless runner.
        run: xvfb-run -a bun run e2e
