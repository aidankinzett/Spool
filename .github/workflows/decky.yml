name: decky-plugin

# Build + test the Spool Backup Decky plugin and package an installable zip.
# Scoped to decky/** so it doesn't run on unrelated app/server changes.
on:
  push:
    branches: [master]
    paths:
      - "decky/**"
      - "tauri/src-tauri/src/plugin_server.rs"
      - "tauri/src-tauri/src/cli.rs"
      - "tauri/src-tauri/src/lib.rs"
      - "tauri/src-tauri/src/paths.rs"
      - "tauri/src-tauri/Cargo.toml"
      - ".github/workflows/decky.yml"
  pull_request:
    paths:
      - "decky/**"
      - "tauri/src-tauri/src/plugin_server.rs"
      - "tauri/src-tauri/src/cli.rs"
      - "tauri/src-tauri/src/lib.rs"
      - "tauri/src-tauri/src/paths.rs"
      - "tauri/src-tauri/Cargo.toml"
      - ".github/workflows/decky.yml"

defaults:
  run:
    working-directory: decky

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Frontend: pnpm. action-setup runs from the repo root (the
      # working-directory default only applies to run: steps), so it can't read
      # decky/package.json's packageManager pin — give it the version directly.
      # pnpm 11 requires Node >= 22.13 (it imports the node:sqlite builtin), so
      # Node must be 22 or setup-node's pnpm store probe crashes with
      # ERR_UNKNOWN_BUILTIN_MODULE.
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: decky/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Verify bundle exists
        run: test -f dist/index.js

      # Lay the plugin out the way Decky Loader expects, then zip it.
      - name: Package
        run: |
          rm -rf package
          mkdir -p package/spool-backup/dist
          cp dist/index.js package/spool-backup/dist/
          cp main.py plugin.json package.json package/spool-backup/
          cd package && zip -r ../spool-backup.zip spool-backup
      - uses: actions/upload-artifact@v7
        with:
          name: spool-backup-plugin
          path: decky/spool-backup.zip
          if-no-files-found: error
