name: decky-plugin

# Build + test the Spool Backup Decky plugin and package an installable zip.
# Scoped to decky/** so it doesn't run on unrelated app/server changes.
on:
  push:
    branches: [master]
    paths:
      - "decky/**"
      - "tauri/src-tauri/src/plugin_server.rs"
      - "tauri/src-tauri/src/cli.rs"
      - "tauri/src-tauri/src/lib.rs"
      - "tauri/src-tauri/src/paths.rs"
      - "tauri/src-tauri/Cargo.toml"
      - ".github/workflows/decky.yml"
  pull_request:
    paths:
      - "decky/**"
      - "tauri/src-tauri/src/plugin_server.rs"
      - "tauri/src-tauri/src/cli.rs"
      - "tauri/src-tauri/src/lib.rs"
      - "tauri/src-tauri/src/paths.rs"
      - "tauri/src-tauri/Cargo.toml"
      - ".github/workflows/decky.yml"

defaults:
  run:
    working-directory: decky

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Frontend: bun (same toolchain as the Tauri app).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Verify bundle exists
        run: test -f dist/index.js

      # Lay the plugin out the way Decky Loader expects, then zip it.
      - name: Package
        run: |
          rm -rf package
          mkdir -p package/spool-backup/dist
          cp dist/index.js package/spool-backup/dist/
          cp main.py plugin.json package.json package/spool-backup/
          cd package && zip -r ../spool-backup.zip spool-backup
      - uses: actions/upload-artifact@v7
        with:
          name: spool-backup-plugin
          path: decky/spool-backup.zip
          if-no-files-found: error
