name: Deploy docs to GitHub Pages

on:
  # Run on pushes to master that touch the docs site or this workflow.
  push:
    branches: [master]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build with Astro
        # Auto-detects the package manager from docs-site/bun.lock and runs
        # install + astro build, then uploads the Pages artifact.
        uses: withastro/action@v6
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
