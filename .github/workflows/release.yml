name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Build executable
        run: |
          uv run pyinstaller `
            --onefile `
            --windowed `
            --collect-all customtkinter `
            --name ludusavi-wrap `
            main.py

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ludusavi-wrap.exe
          generate_release_notes: true
