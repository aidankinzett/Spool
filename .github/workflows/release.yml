name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $tag = "${{ github.ref_name }}"
          # Bump app version constant
          (Get-Content MainWindow.xaml.cs) -replace 'Version = ".*"', "Version = `"$version`"" | Set-Content MainWindow.xaml.cs
          # Bump installer version
          (Get-Content installer.iss) -replace 'AppVersion=.*', "AppVersion=$version" | Set-Content installer.iss
          # Bump auto-updater manifest
          (Get-Content update.xml) -replace '<version>.*</version>', "<version>$version</version>" | Set-Content update.xml -Encoding utf8
          (Get-Content update.xml) -replace '<url>.*</url>', "<url>https://github.com/aidankinzett/ludusavi-wrap/releases/download/$tag/ludusavi-wrap-setup.exe</url>" | Set-Content update.xml -Encoding utf8

      - name: Compile Launcher Stub
        shell: pwsh
        run: |
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:winexe /win32icon:launcher_stub.ico /out:launcher_stub.exe launcher_stub.cs

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Single-File App
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:Version=$version

      - name: Build Installer
        run: iscc installer.iss

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/net9.0-windows/win-x64/publish/ludusavi-wrap.exe
            dist/ludusavi-wrap-setup.exe
          generate_release_notes: true

      - name: Commit version updates to master
        shell: pwsh
        run: |
          $csContent = Get-Content MainWindow.xaml.cs -Raw
          $issContent = Get-Content installer.iss -Raw
          $xmlContent = Get-Content update.xml -Raw
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -f master
          Set-Content MainWindow.xaml.cs $csContent -NoNewline
          Set-Content installer.iss $issContent -NoNewline
          Set-Content update.xml $xmlContent -Encoding utf8 -NoNewline
          git add MainWindow.xaml.cs installer.iss update.xml
          git commit -m "chore: bump version files to ${{ github.ref_name }}"
          git push origin master
