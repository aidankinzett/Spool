name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      # sccache wraps rustc and stores compiled object files in the
      # GitHub Actions cache. Survives Cargo.lock churn that breaks
      # the Swatinem/rust-cache key — only the changed crates rebuild.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      # rust-cache also serializes target/; disable that since sccache
      # is the source of truth for object files. Keep registry caching.
      CARGO_INCREMENTAL: "0"
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          # sccache owns object caching; just cache the registry/index.
          cache-targets: "false"

      - name: Resolve version
        id: ver
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Stamp version into Tauri config + Cargo.toml
        # tauri-action reads `version` from tauri.conf.json to name the
        # bundle and to populate the updater manifest. Sync both files
        # to the git tag — neither is meant to be committed back, so
        # this stays as an in-CI overwrite.
        run: |
          $version = "${{ steps.ver.outputs.value }}"
          $conf = Get-Content tauri/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 32 | Set-Content tauri/src-tauri/tauri.conf.json -Encoding utf8
          (Get-Content tauri/src-tauri/Cargo.toml) `
            -replace '^version = ".*"$', "version = `"$version`"" `
            | Set-Content tauri/src-tauri/Cargo.toml -Encoding utf8

      - name: Generate changelog
        id: changelog
        run: |
          $prevTag = git describe --tags --abbrev=0 HEAD^
          $commits = git log "$prevTag..HEAD" --pretty=format:"%s" | Where-Object { $_ -ne "" }

          $features = @($commits | Where-Object { $_ -match '^feat' } | ForEach-Object { "- $_" })
          $fixes    = @($commits | Where-Object { $_ -match '^fix'  } | ForEach-Object { "- $_" })
          $other    = @($commits | Where-Object { $_ -notmatch '^feat|^fix' } | ForEach-Object { "- $_" })

          $body = ""
          if ($features.Count -gt 0) { $body += "### Features`n" + ($features -join "`n") + "`n`n" }
          if ($fixes.Count    -gt 0) { $body += "### Bug Fixes`n" + ($fixes    -join "`n") + "`n`n" }
          if ($other.Count    -gt 0) { $body += "### Other`n"     + ($other    -join "`n") + "`n`n" }

          "CHANGELOG<<EOF" >> $env:GITHUB_OUTPUT
          $body.TrimEnd() >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Compile launcher stub
        # The launcher stub is a tiny standalone .NET console exe embedded
        # into the Rust binary via `include_bytes!`. Compiled with the
        # framework csc.exe shipped with Windows — no .NET SDK required.
        run: |
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:winexe /win32icon:launcher_stub.ico /out:launcher_stub.exe launcher_stub.cs

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          # Updater signing — required by the tauri-plugin-updater
          # config in `tauri.conf.json`. See
          # https://v2.tauri.app/plugin/updater for key generation.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Spool ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.CHANGELOG }}
          releaseDraft: false
          prerelease: false
          # NSIS installer + updater artifacts (.sig + latest.json).
          # `app` here is the unbundled exe, which we skip — only the
          # NSIS installer is published.
          args: --bundles nsis

  build-linux:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          cache-targets: "false"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Stamp version into Tauri config + Cargo.toml
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' tauri/src-tauri/tauri.conf.json > /tmp/tauri.conf.json && mv /tmp/tauri.conf.json tauri/src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" tauri/src-tauri/Cargo.toml

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Build Tauri AppImage
        # No tagName here — we publish manually after the wayland-strip
        # fix below, so the broken intermediate AppImage never reaches
        # the release.
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          args: --bundles appimage

      - name: Strip bundled libwayland-* and repack AppImage
        # linuxdeploy-plugin-gtk over-bundles libwayland-{client,cursor,egl,server}
        # from the Ubuntu build host. On Wayland sessions with newer
        # Mesa (Bazzite, CachyOS, modern Fedora, SteamOS) the older
        # bundled libwayland-client talks to the host's newer EGL via
        # wl_drm and aborts with `EGL_BAD_PARAMETER. Aborting...` before
        # WebKit can render. The libs are on linuxdeploy's default
        # excludelist; the GTK plugin re-adds them. Strip them so
        # WebKit falls back to host-provided libwayland-* matching the
        # host compositor's protocol.
        working-directory: tauri/src-tauri/target/release/bundle/appimage
        run: |
          set -euo pipefail
          APPIMAGE=$(ls Spool_*_amd64.AppImage)
          chmod +x "$APPIMAGE"
          ./"$APPIMAGE" --appimage-extract >/dev/null
          rm -f squashfs-root/usr/lib/libwayland-client.so.* \
                squashfs-root/usr/lib/libwayland-cursor.so.* \
                squashfs-root/usr/lib/libwayland-egl.so.* \
                squashfs-root/usr/lib/libwayland-server.so.*
          wget -q -O appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          rm "$APPIMAGE" "$APPIMAGE.sig"
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      - name: Re-sign repacked AppImage
        # The signature produced by tauri-bundler is tied to the
        # original AppImage bytes; repacking invalidates it. Re-sign
        # with the same key so the Tauri updater accepts the artifact.
        working-directory: tauri/src-tauri/target/release/bundle/appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APPIMAGE=$(ls Spool_*_amd64.AppImage)
          bunx @tauri-apps/cli signer sign "$APPIMAGE"

      - name: Upload AppImage + signature to release
        working-directory: tauri/src-tauri/target/release/bundle/appimage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            Spool_*_amd64.AppImage \
            Spool_*_amd64.AppImage.sig \
            --clobber
