name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # sccache wraps rustc and stores compiled object files in a local
      # directory cached by actions/cache. Survives Cargo.lock churn.
      SCCACHE_DIR: "${{ github.workspace }}/.sccache"
      RUSTC_WRAPPER: "sccache"
      # rust-cache also serializes target/; disable that since sccache
      # is the source of truth for object files. Keep registry caching.
      CARGO_INCREMENTAL: "0"
      BUN_INSTALL_CACHE_DIR: "${{ github.workspace }}/.bun-cache"
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Bun cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.bun-cache
          key: bun-${{ runner.os }}-${{ hashFiles('tauri/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Enable LLD linker
        # Keep this identical to ci.yml's build-windows: RUSTFLAGS is part of
        # the sccache compile-cache hash, so the release build only reuses
        # ci.yml's warmed objects if the linker flag matches. Point rustc at
        # LLVM's preinstalled lld-link to cut Windows link time; probe first
        # so a runner-image change falls back to link.exe rather than break.
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (Test-Path "$llvm\lld-link.exe") {
            "$llvm" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            "RUSTFLAGS=-C linker=lld-link" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "Using lld-link from $llvm"
          } else {
            Write-Warning "lld-link not found; falling back to link.exe"
          }

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Sccache cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ github.ref_name }}-
            sccache-${{ runner.os }}-

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          # sccache owns object caching; just cache the registry/index.
          cache-targets: "false"
          # Fixed key (not the job name) so ci.yml can populate the same
          # registry cache that this tag build restores.
          shared-key: spool-windows

      - name: Resolve version
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = "$env:REF_NAME".TrimStart('v')
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Stamp version into Tauri config + Cargo.toml
        # tauri-action reads `version` from tauri.conf.json to name the
        # bundle and to populate the updater manifest. Sync both files
        # to the git tag — neither is meant to be committed back, so
        # this stays as an in-CI overwrite.
        run: |
          $version = "${{ steps.ver.outputs.value }}"
          $conf = Get-Content tauri/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 32 | Set-Content tauri/src-tauri/tauri.conf.json -Encoding utf8
          (Get-Content tauri/src-tauri/Cargo.toml) `
            -replace '^version = ".*"$', "version = `"$version`"" `
            | Set-Content tauri/src-tauri/Cargo.toml -Encoding utf8

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Cache sidecars
        id: cache-sidecars
        uses: actions/cache@v5
        with:
          path: tauri/src-tauri/binaries
          key: sidecars-${{ runner.os }}-${{ hashFiles('tauri/scripts/download-sidecars.js') }}

      - name: Download sidecars
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        working-directory: tauri
        run: bun run download-sidecars

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          # Updater signing — required by the tauri-plugin-updater
          # config in `tauri.conf.json`. See
          # https://v2.tauri.app/plugin/updater for key generation.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Spool's own Google Drive OAuth client, baked into the binary via
          # option_env! in rclone.rs so users get a dedicated Drive API quota
          # instead of rclone's globally rate-limited shared default. Absent
          # secrets fall back to rclone's shared client (no build failure).
          SPOOL_GDRIVE_CLIENT_ID: ${{ secrets.SPOOL_GDRIVE_CLIENT_ID }}
          SPOOL_GDRIVE_CLIENT_SECRET: ${{ secrets.SPOOL_GDRIVE_CLIENT_SECRET }}
        with:
          projectPath: tauri
          # NSIS installer + updater artifacts (.sig).
          args: --bundles nsis

      - name: sccache stats
        # Surface the compile-cache hit rate so a cold/evicted cache is
        # visible in the job log instead of silently slow.
        run: sccache --show-stats

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v7
        with:
          name: windows-bundle
          path: |
            tauri/src-tauri/target/release/bundle/nsis/Spool_*_x64-setup.exe
            tauri/src-tauri/target/release/bundle/nsis/Spool_*_x64-setup.exe.sig
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    env:
      SCCACHE_DIR: "${{ github.workspace }}/.sccache"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
      BUN_INSTALL_CACHE_DIR: "${{ github.workspace }}/.bun-cache"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Sccache cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ github.ref_name }}-
            sccache-${{ runner.os }}-

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          cache-targets: "false"
          shared-key: spool-linux

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Stamp version into Tauri config + Cargo.toml
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' tauri/src-tauri/tauri.conf.json > /tmp/tauri.conf.json && mv /tmp/tauri.conf.json tauri/src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" tauri/src-tauri/Cargo.toml

      # The Linux Spool binary embeds the Decky plugin bundle (include_str!);
      # build it so the released AppImage ships the real plugin, not the
      # build.rs placeholder. Node 22: pnpm 11 (pinned via decky/package.json
      # packageManager) needs Node >= 22.13 or corepack crashes on node:sqlite.
      - name: Setup Node for Decky plugin
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('decky/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
      - name: Build Decky plugin
        working-directory: decky
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile --store-dir ${{ github.workspace }}/.pnpm-store
          corepack pnpm build

      - name: Bun cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.bun-cache
          key: bun-${{ runner.os }}-${{ hashFiles('tauri/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: tauri
        run: bun install --frozen-lockfile

      - name: Cache sidecars
        id: cache-sidecars
        uses: actions/cache@v5
        with:
          path: tauri/src-tauri/binaries
          key: sidecars-${{ runner.os }}-${{ hashFiles('tauri/scripts/download-sidecars.js') }}

      - name: Download sidecars
        if: steps.cache-sidecars.outputs.cache-hit != 'true'
        working-directory: tauri
        run: bun run download-sidecars

      - name: Build Tauri AppImage
        # No tagName here — we publish in the release job after the
        # wayland-strip fix below, so the broken intermediate AppImage
        # never reaches the release.
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # See the Windows job above — bakes in Spool's Drive OAuth client.
          SPOOL_GDRIVE_CLIENT_ID: ${{ secrets.SPOOL_GDRIVE_CLIENT_ID }}
          SPOOL_GDRIVE_CLIENT_SECRET: ${{ secrets.SPOOL_GDRIVE_CLIENT_SECRET }}
        with:
          projectPath: tauri
          args: --bundles appimage

      - name: Strip bundled libwayland-* and repack AppImage
        # linuxdeploy-plugin-gtk over-bundles libwayland-{client,cursor,egl,server}
        # from the Ubuntu build host. On Wayland sessions with newer
        # Mesa (Bazzite, CachyOS, modern Fedora, SteamOS) the older
        # bundled libwayland-client talks to the host's newer EGL via
        # wl_drm and aborts with `EGL_BAD_PARAMETER. Aborting...` before
        # WebKit can render. The libs are on linuxdeploy's default
        # excludelist; the GTK plugin re-adds them. Strip them so
        # WebKit falls back to host-provided libwayland-* matching the
        # host compositor's protocol.
        working-directory: tauri/src-tauri/target/release/bundle/appimage
        run: |
          set -euo pipefail
          APPIMAGE=$(ls Spool_*_amd64.AppImage)
          chmod +x "$APPIMAGE"
          ./"$APPIMAGE" --appimage-extract >/dev/null
          rm -f squashfs-root/usr/lib/libwayland-client.so.* \
                squashfs-root/usr/lib/libwayland-cursor.so.* \
                squashfs-root/usr/lib/libwayland-egl.so.* \
                squashfs-root/usr/lib/libwayland-server.so.*
          wget -q -O appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          rm "$APPIMAGE" "$APPIMAGE.sig"
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root Spool_amd64.AppImage
          rm -rf squashfs-root appimagetool

      - name: Re-sign repacked AppImage
        # The signature produced by tauri-bundler is tied to the
        # original AppImage bytes; repacking invalidates it. Re-sign
        # with the same key so the Tauri updater accepts the artifact.
        working-directory: tauri/src-tauri/target/release/bundle/appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          bunx @tauri-apps/cli signer sign Spool_amd64.AppImage

      - name: Package raw binary tarball (for AUR spool-bin)
        # The AppImage bundles its own libs (and we strip libwayland from it);
        # the AUR package instead wants the raw binary linking against system
        # libs. Ship binary + icon; the PKGBUILD generates the .desktop.
        working-directory: tauri/src-tauri
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          STAGE="$(mktemp -d)"
          install -Dm755 target/release/spool "$STAGE/spool"
          install -Dm644 icons/128x128.png "$STAGE/spool.png"
          tar -czf "target/release/bundle/appimage/spool-${VERSION}-x86_64.tar.gz" -C "$STAGE" spool spool.png
          rm -rf "$STAGE"

      - name: sccache stats
        run: sccache --show-stats

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: |
            tauri/src-tauri/target/release/bundle/appimage/Spool_amd64.AppImage
            tauri/src-tauri/target/release/bundle/appimage/Spool_amd64.AppImage.sig
            tauri/src-tauri/target/release/bundle/appimage/spool-*-x86_64.tar.gz
          if-no-files-found: error

  release:
    # Single publishing point. Waits for both platform builds, then
    # assembles the release from their uploaded artifacts. Decoupling
    # this from the build jobs lets Windows and Linux compile in
    # parallel and removes the old cross-job .sig pull-back hack.
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the changelog can diff against the
          # previous release tag.
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi
          COMMITS=$(git log "$RANGE" --pretty=format:'%s' | grep -v '^$' || true)

          FEATURES=$(printf '%s\n' "$COMMITS" | grep -E '^feat' | sed 's/^/- /' || true)
          FIXES=$(printf '%s\n' "$COMMITS" | grep -E '^fix' | sed 's/^/- /' || true)
          OTHER=$(printf '%s\n' "$COMMITS" | grep -vE '^feat|^fix' | sed 's/^/- /' || true)

          : > notes.md
          if [ -n "$FEATURES" ]; then printf '### Features\n%s\n\n' "$FEATURES" >> notes.md; fi
          if [ -n "$FIXES" ];    then printf '### Bug Fixes\n%s\n\n' "$FIXES"    >> notes.md; fi
          if [ -n "$OTHER" ];    then printf '### Other\n%s\n\n' "$OTHER"        >> notes.md; fi

      - name: Create GitHub release
        # tauri-action's release-creation path ignores GITHUB_TOKEN
        # overrides and uses the default workflow token, which 403s on
        # this repo. Publish via `gh release create` with the PAT.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          WIN_EXE=$(ls artifacts/windows-bundle/Spool_*_x64-setup.exe)
          WIN_SIG=$(ls artifacts/windows-bundle/Spool_*_x64-setup.exe.sig)
          LIN_APP=$(ls artifacts/linux-bundle/Spool_amd64.AppImage)
          LIN_SIG=$(ls artifacts/linux-bundle/Spool_amd64.AppImage.sig)
          LIN_TAR=$(ls artifacts/linux-bundle/spool-*-x86_64.tar.gz)
          gh release create "$TAG_NAME" \
            --title "Spool $TAG_NAME" \
            --notes-file notes.md \
            "$WIN_EXE" "$WIN_SIG" "$LIN_APP" "$LIN_SIG" "$LIN_TAR"

      - name: Build and upload latest.json updater manifest
        # tauri-action only emits latest.json on its own release-creation
        # path. We publish via `gh release create` with a PAT (the default
        # GITHUB_TOKEN 403s on this repo), so we synthesize the manifest
        # ourselves here from the uploaded artifacts.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="$TAG_NAME"
          REPO="$REPO_NAME"
          VERSION="${TAG#v}"

          WIN_SIG_FILE=$(ls artifacts/windows-bundle/Spool_*_x64-setup.exe.sig)
          WIN_EXE_NAME=$(basename "$WIN_SIG_FILE" .sig)
          WIN_SIG=$(cat "$WIN_SIG_FILE")

          LIN_APP_FILE=$(ls artifacts/linux-bundle/Spool_amd64.AppImage)
          LIN_SIG_FILE="${LIN_APP_FILE}.sig"
          LIN_APP_NAME=$(basename "$LIN_APP_FILE")
          LIN_SIG=$(cat "$LIN_SIG_FILE")

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes    "See the release notes at $BASE_URL" \
            --arg win_sig  "$WIN_SIG" \
            --arg win_url  "$BASE_URL/$WIN_EXE_NAME" \
            --arg lin_sig  "$LIN_SIG" \
            --arg lin_url  "$BASE_URL/$LIN_APP_NAME" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64":   { signature: $lin_sig, url: $lin_url }
              }
            }' > latest.json

          gh release upload "$TAG" latest.json -R "$REPO" --clobber
