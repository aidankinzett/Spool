name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $prevTag = git describe --tags --abbrev=0 HEAD^
          $commits = git log "$prevTag..HEAD" --pretty=format:"%s" | Where-Object { $_ -ne "" }

          $features = @($commits | Where-Object { $_ -match '^feat' } | ForEach-Object { "- $_" })
          $fixes    = @($commits | Where-Object { $_ -match '^fix'  } | ForEach-Object { "- $_" })
          $other    = @($commits | Where-Object { $_ -notmatch '^feat|^fix' } | ForEach-Object { "- $_" })

          $body = ""
          if ($features.Count -gt 0) { $body += "### Features`n" + ($features -join "`n") + "`n`n" }
          if ($fixes.Count    -gt 0) { $body += "### Bug Fixes`n" + ($fixes    -join "`n") + "`n`n" }
          if ($other.Count    -gt 0) { $body += "### Other`n"     + ($other    -join "`n") + "`n`n" }

          "CHANGELOG<<EOF" >> $env:GITHUB_OUTPUT
          $body.TrimEnd() >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $tag = "${{ github.ref_name }}"
          # Bump auto-updater manifest (the only file that needs a committed version string)
          (Get-Content update.xml) -replace '<version>.*</version>', "<version>$version</version>" | Set-Content update.xml -Encoding utf8
          (Get-Content update.xml) -replace '<url>.*</url>', "<url>https://github.com/aidankinzett/Spool/releases/download/$tag/spool-setup.exe</url>" | Set-Content update.xml -Encoding utf8

      - name: Compile Launcher Stub
        shell: pwsh
        run: |
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:winexe /win32icon:launcher_stub.ico /out:launcher_stub.exe launcher_stub.cs

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Single-File App
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:Version=$version

      - name: Build Installer
        run: iscc installer.iss

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/net10.0-windows10.0.17763.0/win-x64/publish/spool.exe
            dist/spool-setup.exe
          body: ${{ steps.changelog.outputs.CHANGELOG }}

      - name: Commit update.xml to master
        shell: pwsh
        run: |
          $xmlContent = Get-Content update.xml -Raw
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -f master
          git reset --hard origin/master
          Set-Content update.xml $xmlContent -Encoding utf8 -NoNewline
          git add update.xml
          git commit -m "chore: bump update.xml to ${{ github.ref_name }}"
          git push origin master
