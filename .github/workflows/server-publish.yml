name: Publish Server Image

on:
  push:
    tags: ["v*"]

concurrency:
  group: server-publish
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect server changes since last tag
        id: changes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$PREV" HEAD -- server/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.changes.outputs.changed == 'true'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/spool-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" =~ ^v ]]; then
            echo "value=${REF#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Retag existing image (no server changes)
        if: steps.changes.outputs.changed == 'false'
        env:
          VERSION: ${{ steps.ver.outputs.value }}
          REPO: ghcr.io/${{ github.repository_owner }}/spool-server
        run: |
          docker buildx imagetools create \
            --tag "${REPO}:${VERSION}" \
            --tag "${REPO}:latest" \
            "${REPO}:latest"
