services:
  ludusavi-lock:
    image: ghcr.io/aidankinzett/ludusavi-wrap-server:latest
    hostname: ludusavi-lock
    ports:
      - "47633:47633"
    environment:
      - ADMIN_SECRET=changeme   # REQUIRED: set a strong secret before use
      - PORT=47633
      - DATABASE_PATH=/data/ludusavi.db
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:47633/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
