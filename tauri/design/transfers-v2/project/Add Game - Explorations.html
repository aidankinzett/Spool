<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spool — Add Game (redesign)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font: "Segoe UI Variable Text", "Segoe UI Variable", "Segoe UI",
            "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #f0eee9;
    font-family: var(--font);
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  #root { position: relative; width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design canvas -->
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- Brand mark + shared icons + controls (from Settings) -->
<script type="text/babel" src="brand/spool-mark.jsx"></script>
<script type="text/babel" src="settings/icons.jsx"></script>
<script type="text/babel" src="settings/controls.jsx"></script>

<!-- Add Game variants -->
<script type="text/babel" src="addgame/shared.jsx"></script>
<script type="text/babel" src="addgame/v0-current.jsx"></script>
<script type="text/babel" src="addgame/v1-identify-first.jsx"></script>
<script type="text/babel" src="addgame/v2-live-combobox.jsx"></script>
<script type="text/babel" src="addgame/v3-wizard.jsx"></script>
<script type="text/babel" src="addgame/v4-drop-detect.jsx"></script>

<script type="text/babel">
/* Centered stage with a soft dark desktop behind the dialog so the modal
   reads as a real popup, not a floating card on cream paper. */
function Stage({ children, height = 600 }) {
  return (
    <div style={{
      width: 760,
      height,
      background:
        "radial-gradient(700px 500px at 30% 20%, rgba(76,194,255,0.08), transparent 65%)," +
        "radial-gradient(700px 500px at 80% 80%, rgba(255,138,61,0.05), transparent 65%)," +
        "#0d0d0f",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      borderRadius: 10,
      overflow: "hidden",
      position: "relative",
    }}>
      {children}
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="baseline"
        title="Baseline"
        subtitle="The current dialog, reproduced for side-by-side comparison."
      >
        <DCArtboard id="v0" label="Current — three equivalent fields, easy to miss the Search step" width={760} height={560}>
          <Stage height={560}><AddGameCurrent /></Stage>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="lowlift"
        title="Low-lift fixes"
        subtitle="Keep the form, fix the hierarchy. Two options."
      >
        <DCArtboard id="v1" label="V1 · Identify-first — reorder + 'matched to ludusavi' chip" width={760} height={580}>
          <Stage height={580}><AddGameV1 /></Stage>
        </DCArtboard>
        <DCArtboard id="v2" label="V2 · Live combobox — no Search button, results appear as you type" width={760} height={620}>
          <Stage height={620}><AddGameV2 /></Stage>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="novel"
        title="Stronger redesigns"
        subtitle="Restructure the flow itself."
      >
        <DCArtboard id="v3" label="V3 · Two-step wizard — search is unavoidable" width={760} height={620}>
          <Stage height={620}><AddGameV3 /></Stage>
        </DCArtboard>
        <DCArtboard id="v4" label="V4 · Drop the .exe — Spool auto-detects the ludusavi entry" width={760} height={720}>
          <Stage height={720}><AddGameV4 /></Stage>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
