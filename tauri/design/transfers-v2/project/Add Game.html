<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spool — Add Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font: "Segoe UI Variable Text", "Segoe UI Variable", "Segoe UI",
            "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #060608;
    font-family: var(--font);
    color: #fff;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  /* A faintly-implied desktop behind the dialog — soft accent washes
     plus blurred shapes of an open Library window — so the modal reads
     as a real popup, not a freestanding card. */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(1100px 700px at 20% 10%, rgba(76, 194, 255, 0.05), transparent 70%),
      radial-gradient(900px 700px at 90% 90%, rgba(255, 138, 61, 0.04), transparent 70%),
      #060608;
    pointer-events: none;
  }
  #root {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Ghost of the Library window behind the modal, blurred & dim */
  .desktop-ghost {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    filter: blur(14px) saturate(0.7);
    opacity: 0.35;
  }
  .desktop-ghost .strip {
    position: absolute;
    background: linear-gradient(180deg, rgba(28,28,28,0.7), rgba(20,20,20,0.85));
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 10px;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 5px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
</style>
</head>
<body>
<div id="root">
  <div class="desktop-ghost">
    <div class="strip" style="top: 60px; left: 80px; right: 80px; height: 70px;"></div>
    <div class="strip" style="top: 160px; left: 80px; width: 220px; bottom: 60px;"></div>
    <div class="strip" style="top: 160px; left: 320px; right: 80px; bottom: 60px;"></div>
  </div>
</div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweaks shell -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Brand mark + shared icons + controls (from Settings) -->
<script type="text/babel" src="brand/spool-mark.jsx"></script>
<script type="text/babel" src="settings/icons.jsx"></script>
<script type="text/babel" src="settings/controls.jsx"></script>

<!-- Add Game -->
<script type="text/babel" src="addgame/shared.jsx"></script>
<script type="text/babel" src="addgame/final.jsx"></script>

<script type="text/babel">
ReactDOM.createRoot(document.getElementById("root").appendChild(document.createElement("div"))).render(<AddGameFinal />);
</script>
</body>
</html>
