<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spool — Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Segoe UI Variable is the Windows 11 system font.
     We fall back gracefully on non-Windows machines. */
  :root {
    --font: "Segoe UI Variable Text", "Segoe UI Variable", "Segoe UI",
            "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-display: "Segoe UI Variable Display", "Segoe UI Variable",
                    "Segoe UI", "Inter", sans-serif;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0d0d0d;
    font-family: var(--font);
    color: #fff;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle Mica-like ambient backdrop behind the window */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(900px 600px at 20% 0%, rgba(76, 194, 255, 0.06), transparent 70%),
      radial-gradient(800px 600px at 90% 100%, rgba(160, 132, 232, 0.05), transparent 70%),
      #0a0a0a;
    pointer-events: none;
  }

  #root {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Scrollbars — Windows 11 thin overlay style */
  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 5px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.22);
    background-clip: content-box;
    border: 2px solid transparent;
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweaks panel host helper -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Brand -->
<script type="text/babel" src="brand/spool-mark.jsx"></script>

<!-- Settings app -->
<script type="text/babel" src="settings/icons.jsx"></script>
<script type="text/babel" src="settings/controls.jsx"></script>
<script type="text/babel" src="settings/sections.jsx"></script>
<script type="text/babel" src="settings/app.jsx"></script>

</body>
</html>
