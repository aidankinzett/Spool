<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spool — Touch Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font: "Segoe UI Variable Text", "Segoe UI Variable", "Segoe UI",
            "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-display: "Segoe UI Variable Display", "Segoe UI Variable",
                    "Segoe UI", "Inter", sans-serif;
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #f0eee9;
    font-family: var(--font);
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  #root { position: relative; width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design canvas + tweaks -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Brand mark + shared icons + controls -->
<script type="text/babel" src="brand/spool-mark.jsx"></script>
<script type="text/babel" src="settings/icons.jsx"></script>
<script type="text/babel" src="settings/controls.jsx"></script>

<!-- Library data + helpers + extra icons (for relativeDate, formatPlaytime, IconPlay etc.) -->
<script src="library/data.js"></script>
<script type="text/babel" src="library/icons-extra.jsx"></script>
<script type="text/babel" src="library/sidebar.jsx"></script>

<!-- Add Game shared (icons + ACCENT + Hi… helpers, not strictly needed but cheap) -->
<script type="text/babel" src="addgame/shared.jsx"></script>

<!-- Touch mode -->
<script src="touch/tokens.js"></script>
<script type="text/babel" src="touch/library-touch.jsx"></script>
<script type="text/babel" src="touch/addgame-touch.jsx"></script>

<script type="text/babel">
const { useState } = React;

/* Soft, dim desktop behind floating modals so the dialog reads as a
   real popup over the OS rather than a card on cream paper. */
function Stage({ children, width, height, pad = 20 }) {
  return (
    <div style={{
      width, height,
      background:
        "radial-gradient(700px 500px at 30% 20%, rgba(76,194,255,0.08), transparent 65%)," +
        "radial-gradient(700px 500px at 80% 80%, rgba(255,138,61,0.05), transparent 65%)," +
        "#0d0d0f",
      display: "flex", alignItems: "center", justifyContent: "center",
      borderRadius: 10, overflow: "hidden", position: "relative",
      padding: pad, boxSizing: "border-box",
    }}>
      {children}
    </div>
  );
}

/* Subtle label band along the top of an artboard so the comparison is
   unmistakable at a glance. */
function ModeBadge({ kind }) {
  const cool = kind === "touch";
  const fg = cool ? "#7dd3fc" : "rgba(255,255,255,0.65)";
  const bg = cool ? "rgba(125,211,252,0.10)" : "rgba(255,255,255,0.04)";
  const border = cool ? "rgba(125,211,252,0.25)" : "rgba(255,255,255,0.08)";
  return (
    <div style={{
      position: "absolute", top: 14, left: 14, zIndex: 5,
      display: "inline-flex", alignItems: "center", gap: 7,
      padding: "5px 10px 5px 8px",
      background: bg, border: `1px solid ${border}`,
      borderRadius: 99,
      fontSize: 10.5, color: fg, fontWeight: 600,
      letterSpacing: "0.06em", textTransform: "uppercase",
      fontFamily: "var(--font)",
    }}>
      <span style={{
        width: 6, height: 6, borderRadius: 3,
        background: fg, boxShadow: cool ? `0 0 8px ${fg}` : "none",
      }}/>
      {kind === "touch" ? "Touch · pointer: coarse" : "Desktop · pointer: fine"}
    </div>
  );
}

/* =================== DENSITY RULER =================== */
const TOKEN_ROWS = [
  { key: "titleBar",      label: "Title bar height",            unit: "px" },
  { key: "titleBtnW",     label: "Title bar button width",      unit: "px" },
  { key: "primaryH",      label: "Primary CTA height (Play)",   unit: "px" },
  { key: "btnH",          label: "Secondary button height",     unit: "px" },
  { key: "iconBtn",       label: "Standalone icon button",      unit: "px" },
  { key: "rowH",          label: "List row minimum height",     unit: "px" },
  { key: "sidebarW",      label: "Sidebar width",               unit: "px" },
  { key: "thumbSm",       label: "Sidebar thumbnail",           unit: "px" },
  { key: "thumbXl",       label: "Hero cover art",              unit: "px" },
  { key: "radio",         label: "Radio target",                unit: "px" },
  { key: "chipH",         label: "Filter chip height",          unit: "px" },
  { key: "scrollW",       label: "Scrollbar width",             unit: "px" },
  { key: "base",          label: "Body text",                   unit: "px" },
  { key: "h2",            label: "Card title",                  unit: "px" },
  { key: "h1",            label: "Hero title",                  unit: "px" },
];

function DensityRuler() {
  const D = window.TOUCH_DENSITY.desktop;
  const T = window.TOUCH_DENSITY.touch;
  // Find a max for the bar scale per row to keep proportional bars sensible.
  const maxValue = Math.max(...TOKEN_ROWS.map(r => Math.max(D[r.key], T[r.key])));
  const scale = (v) => (v / maxValue) * 220;

  return (
    <div style={{
      width: 760,
      background: "#fafafa",
      borderRadius: 10,
      padding: 28,
      fontFamily: "var(--font)",
      color: "#1d1d1f",
    }}>
      <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: "-0.01em" }}>
        Density tokens
      </div>
      <div style={{ fontSize: 12.5, color: "#6a6a70", marginTop: 4, marginBottom: 20 }}>
        Every measurement that changes between modes, mapped 1:1. Nothing else moves.
      </div>

      <div style={{
        display: "grid",
        gridTemplateColumns: "180px 1fr 64px 1fr 64px",
        rowGap: 6, columnGap: 14, alignItems: "center",
        fontSize: 11.5,
      }}>
        <div></div>
        <div style={{ color: "#888", textAlign: "right", fontWeight: 500, letterSpacing: "0.04em" }}>DESKTOP</div>
        <div style={{ color: "#888", fontVariantNumeric: "tabular-nums", textAlign: "right" }}></div>
        <div style={{ color: "#2563eb", fontWeight: 500, letterSpacing: "0.04em" }}>TOUCH</div>
        <div style={{ color: "#888", fontVariantNumeric: "tabular-nums" }}></div>

        {TOKEN_ROWS.map(r => {
          const dv = D[r.key], tv = T[r.key];
          const delta = (((tv - dv) / dv) * 100).toFixed(0);
          return (
            <React.Fragment key={r.key}>
              <div style={{ color: "#2c2c30", fontSize: 12 }}>{r.label}</div>
              {/* Desktop bar (right-aligned) */}
              <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center" }}>
                <div style={{
                  height: 8, width: scale(dv),
                  background: "#d4d4d8", borderRadius: 4,
                }}/>
              </div>
              <div style={{
                fontFamily: `"JetBrains Mono", "Cascadia Code", ui-monospace, monospace`,
                fontSize: 11, color: "#6a6a70", textAlign: "right",
                fontVariantNumeric: "tabular-nums",
              }}>{dv}{r.unit}</div>
              {/* Touch bar */}
              <div style={{ display: "flex", alignItems: "center" }}>
                <div style={{
                  height: 8, width: scale(tv),
                  background: "linear-gradient(90deg, #38bdf8, #2563eb)",
                  borderRadius: 4,
                }}/>
                <span style={{
                  marginLeft: 8, fontSize: 10, color: "#16a34a",
                  fontWeight: 600,
                }}>+{delta}%</span>
              </div>
              <div style={{
                fontFamily: `"JetBrains Mono", "Cascadia Code", ui-monospace, monospace`,
                fontSize: 11, color: "#2563eb", textAlign: "left",
                fontVariantNumeric: "tabular-nums", fontWeight: 600,
              }}>{tv}{r.unit}</div>
            </React.Fragment>
          );
        })}
      </div>

      <div style={{
        marginTop: 22, padding: 14,
        background: "#fff", border: "1px solid #e7e6e1",
        borderRadius: 8,
        fontSize: 12, lineHeight: 1.5, color: "#3a3a40",
      }}>
        <div style={{ fontWeight: 600, marginBottom: 4, color: "#1d1d1f" }}>Rules of thumb</div>
        <ul style={{ margin: 0, paddingLeft: 16 }}>
          <li>Hit targets <strong>≥ 44 px</strong>. Primary CTA <strong>≥ 56 px</strong>.</li>
          <li>Body text bumps to <strong>15 px</strong>, not larger — handheld screens are small.</li>
          <li>Right-click menus are replaced by visible <strong>⋯ overflow</strong> buttons.</li>
          <li>Hover-only affordances are demoted; everything tap-discoverable.</li>
          <li>Scrollbars widen but tap-flick-scroll is the primary mechanic.</li>
        </ul>
      </div>
    </div>
  );
}

/* =================== SETTINGS ENTRY MOCKUP =================== */
function SettingsEntry() {
  const [mode, setMode] = useState("auto");
  return (
    <div style={{
      width: 720,
      background: "linear-gradient(180deg, rgba(28,28,28,0.96) 0%, rgba(22,22,22,0.98) 100%)",
      borderRadius: 8,
      border: "1px solid rgba(255,255,255,0.06)",
      boxShadow: "0 20px 60px rgba(0,0,0,0.55)",
      padding: 16, color: "#fff",
      fontFamily: "var(--font)",
    }}>
      <div style={{
        fontSize: 11, color: "rgba(255,255,255,0.5)",
        textTransform: "uppercase", letterSpacing: "0.08em",
        fontWeight: 600, marginBottom: 12, paddingLeft: 4,
      }}>Appearance</div>

      <div style={{
        background: "rgba(255,255,255,0.024)",
        border: "1px solid rgba(255,255,255,0.06)",
        borderRadius: 6, overflow: "hidden",
      }}>
        <div style={{
          display: "flex", alignItems: "center", gap: 14,
          padding: "14px 16px",
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 4,
            background: "rgba(255,255,255,0.04)",
            border: "1px solid rgba(255,255,255,0.05)",
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "rgba(255,255,255,0.85)",
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M9 11.24V7.5a2.5 2.5 0 0 1 5 0v3.74" />
              <path d="M16 16v-3a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v5l3 3h10l3-3" />
            </svg>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 500 }}>Touch Mode</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", marginTop: 2 }}>
              Larger buttons, taller rows, and tap-friendly menus.
              <span style={{ color: "rgba(255,255,255,0.4)" }}> Detected:&nbsp;</span>
              <span style={{ color: "#7ee2a4", fontWeight: 500 }}>Touchscreen present</span>
            </div>
          </div>
          {/* Segmented control: Auto · On · Off */}
          <div style={{
            display: "inline-flex",
            background: "rgba(255,255,255,0.06)",
            border: "1px solid rgba(255,255,255,0.08)",
            borderRadius: 6, padding: 2,
          }}>
            {[
              { value: "auto", label: "Auto" },
              { value: "on",   label: "On" },
              { value: "off",  label: "Off" },
            ].map(opt => (
              <button
                key={opt.value}
                onClick={() => setMode(opt.value)}
                style={{
                  padding: "5px 14px", height: 26,
                  background: mode === opt.value ? "#4cc2ff" : "transparent",
                  color: mode === opt.value ? "#000" : "rgba(255,255,255,0.78)",
                  border: "none", borderRadius: 4,
                  fontFamily: "inherit", fontSize: 12,
                  fontWeight: mode === opt.value ? 600 : 400,
                  cursor: "pointer",
                }}
              >{opt.label}</button>
            ))}
          </div>
        </div>
        <div style={{
          borderTop: "1px solid rgba(255,255,255,0.05)",
          padding: "12px 16px",
          background: "rgba(0,0,0,0.18)",
          fontSize: 11.5, color: "rgba(255,255,255,0.55)",
          display: "flex", alignItems: "center", gap: 8,
        }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="16" x2="12" y2="12" />
            <line x1="12" y1="8" x2="12" y2="8" />
          </svg>
          <span>
            <strong style={{ color: "rgba(255,255,255,0.8)", fontWeight: 500 }}>Auto</strong>
            &nbsp;flips on when you tap the screen, off when you use the mouse — handhelds with both work seamlessly.
          </span>
        </div>
      </div>
    </div>
  );
}

/* =================== MAIN =================== */
const D = () => window.TOUCH_DENSITY.desktop;
const T = () => window.TOUCH_DENSITY.touch;

const PAGE_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#4cc2ff"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(PAGE_DEFAULTS);

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="library"
          title="Library — main window"
          subtitle="Same window at 1240×800. Touch mode bumps targets, type, and breathing room without restructuring the layout."
        >
          <DCArtboard id="library-desktop" label="Desktop" width={1280} height={840}>
            <Stage width={1280} height={840} pad={20}>
              <ModeBadge kind="desktop" />
              <LibraryWindow tokens={D()} accent={tweaks.accent} />
            </Stage>
          </DCArtboard>
          <DCArtboard id="library-touch" label="Touch — auto-detected on Steam Deck / ROG Ally / Legion Go" width={1280} height={840}>
            <Stage width={1280} height={840} pad={20}>
              <ModeBadge kind="touch" />
              <LibraryWindow tokens={T()} accent={tweaks.accent} />
            </Stage>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="addgame"
          title="Add Game — modal dialog"
          subtitle="The multi-match state — radio rows, expandable chevrons, search affordance, and a packed footer all become tappable."
        >
          <DCArtboard id="addgame-desktop" label="Desktop · 680 wide" width={780} height={720}>
            <Stage width={780} height={720} pad={20}>
              <ModeBadge kind="desktop" />
              <AddGameDialog tokens={D()} accent={tweaks.accent} />
            </Stage>
          </DCArtboard>
          <DCArtboard id="addgame-touch" label="Touch · 760 wide (grows ~12%)" width={820} height={840}>
            <Stage width={820} height={840} pad={20}>
              <ModeBadge kind="touch" />
              <AddGameDialog tokens={T()} accent={tweaks.accent} />
            </Stage>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="rules"
          title="The system"
          subtitle="One source of truth — a density token. Every numeric style reads from it. Flipping the mode reflows the whole UI without per-component branching."
        >
          <DCArtboard id="ruler" label="Density tokens — what actually changes" width={820} height={760}>
            <div style={{
              width: 820, height: 760,
              background: "#fafafa", borderRadius: 10,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <DensityRuler />
            </div>
          </DCArtboard>

          <DCArtboard id="settings" label="Settings — where the user controls it" width={780} height={300}>
            <Stage width={780} height={300} pad={20}>
              <SettingsEntry />
            </Stage>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Brand">
          <TweakColor
            label="Accent"
            value={tweaks.accent}
            options={["#4cc2ff", "#7c5cff", "#21d07a", "#ff8a3d", "#ff5d8f"]}
            onChange={(v) => setTweak("accent", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
